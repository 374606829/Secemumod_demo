server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/secemumod_demo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# MVP configuration
mvp:
  jwt:
    secret: ${JWT_SECRET:ThisIsADemoSecretKeyForMVPPurposeOnly2024abcdefghijk}
    expiration-ms: 86400000  # 24 hours
  encryption:
    master-key: ${ENCRYPTION_MASTER_KEY:cGxlYXNlQ2hhbmdlTWVJbkpKaW9uQXVnVUtWYWx1ZQA=}
  storage:
    mod-path: ${MOD_STORAGE_PATH:./storage/mods}

logging:
  level:
    root: INFO
    com.secemumod.demo: DEBUG
