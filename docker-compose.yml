services:
  mysql:
    image: mysql:8.0
    container_name: secemumod-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: secemumod_demo
    ports:
      - "3307:3306"   # Host 3307 to avoid conflict with local MySQL (3306)
    volumes:
      - secemumod_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  seed:
    build:
      context: .
      dockerfile: Dockerfile.seed
    container_name: secemumod-seed
    environment:
      DB_HOST: mysql
      DB_PASSWORD: ${DB_PASSWORD:-root}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:-cGxlYXNlQ2hhbmdlTWVJbkpKaW9uQXVnVUtWYWx1ZQA=}
    volumes:
      - secemumod_storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secemumod-backend
    environment:
      DB_HOST: mysql
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-ThisIsADemoSecretKeyForMVPPurposeOnly2024abcdefghijk}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:-cGxlYXNlQ2hhbmdlTWVJbkpKaW9uQXVnVUtWYWx1ZQA=}
      MOD_STORAGE_PATH: /app/storage/mods
    ports:
      - "8080:8080"
    volumes:
      - secemumod_storage:/app/storage
    depends_on:
      seed:
        condition: service_completed_successfully

volumes:
  secemumod_mysql_data:
  secemumod_storage:
